<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conteo de Stock · La Llave</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="hdr hdr-stock">
  <div class="hdr-brand">
    <div class="hdr-icon">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/><path d="M7 8h2M7 12h2M11 8h6M11 12h6"/></svg>
    </div>
    <div>
      <div class="hdr-title">Conteo de Stock</div>
      <div class="hdr-sub">Depósito Ruta 11 · La Llave</div>
    </div>
  </div>
  <div class="hdr-right">
    <a href="/" class="btn-nav">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2"/></svg>
      Órdenes
    </a>
    <button class="btn-report" onclick="abrirReporte()">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Reporte
    </button>
    <button class="btn-new" onclick="abrirNuevo()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nuevo conteo
    </button>
  </div>
</header>

<main class="main">

  <div class="metrics" style="grid-template-columns:repeat(5,1fr)">
    <div class="mc stock1"><div class="mc-lbl">Conteos hoy</div><div class="mc-val" id="m-hoy">—</div></div>
    <div class="mc stock2"><div class="mc-lbl">Unidades hoy</div><div class="mc-val" id="m-uhoy">—</div></div>
    <div class="mc warn"><div class="mc-lbl">Conteos semana</div><div class="mc-val" id="m-sem">—</div></div>
    <div class="mc ok"><div class="mc-lbl">Unidades semana</div><div class="mc-val" id="m-usem">—</div></div>
    <div class="mc ctrl"><div class="mc-lbl">Marcas activas</div><div class="mc-val" id="m-marcas">—</div></div>
  </div>

  <div class="toolbar">
    <div class="sw">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="si" id="buscar" type="text" placeholder="Buscar por SKU, marca o contador…" oninput="renderTable()">
    </div>
    <select class="fsel" id="f-marca" onchange="renderTable()">
      <option value="">Todas las marcas</option>
      <option value="FILGO">FILGO</option>
      <option value="BIC">BIC</option>
      <option value="COMPACTOR">COMPACTOR</option>
      <option value="INTRO">INTRO</option>
      <option value="OLAMI">OLAMI</option>
    </select>
    <select class="fsel" id="f-contador" onchange="renderTable()">
      <option value="">Todos los contadores</option>
    </select>
    <select class="fsel" id="f-fecha" onchange="renderTable()">
      <option value="">Todo el período</option>
      <option value="hoy">Solo hoy</option>
      <option value="semana">Esta semana</option>
    </select>
  </div>

  <div class="tcard">
    <div class="tscroll">
      <table>
        <thead>
          <tr>
            <th style="width:5px;padding:0;"></th>
            <th>Fecha / Hora</th>
            <th>Marca</th>
            <th>SKU / Artículo</th>
            <th style="text-align:center">Cantidad</th>
            <th>Contador</th>
            <th style="width:40px;"></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

</main>

<!-- MODAL NUEVO CONTEO -->
<div class="overlay" id="mod-nuevo" onclick="cerrarOv('mod-nuevo',event)">
  <div class="mbox" style="max-width:480px">
    <div class="mhdr" style="background:linear-gradient(135deg,#0A4A28,#1E9A52)">
      <div><div class="mtitle">Nuevo conteo de artículo</div><div class="msub">Campos marcados con * son obligatorios</div></div>
      <button class="xbtn" onclick="cerrar('mod-nuevo')">×</button>
    </div>
    <div class="mbody">
      <div class="fgrid">
        <div class="fg">
          <label class="flbl">Marca *</label>
          <select class="fsel2" id="nc-marca">
            <option value="">Seleccionar…</option>
            <option value="FILGO">FILGO</option>
            <option value="BIC">BIC</option>
            <option value="COMPACTOR">COMPACTOR</option>
            <option value="INTRO">INTRO</option>
            <option value="OLAMI">OLAMI</option>
          </select>
        </div>
        <div class="fg">
          <label class="flbl">Cantidad *</label>
          <input class="finp" id="nc-cantidad" type="number" min="0" placeholder="0">
        </div>
        <div class="fg full">
          <label class="flbl">SKU / Código o descripción del artículo *</label>
          <input class="finp" id="nc-sku" type="text" placeholder="Ej: BIC-001 · BIROME AZUL 1.0mm">
        </div>
        <div class="fg full">
          <label class="flbl">Contador *</label>
          <input class="finp" id="nc-contador" type="text" placeholder="Nombre de quien cuenta" list="lista-contadores">
          <datalist id="lista-contadores"></datalist>
        </div>
      </div>
      <div class="factions">
        <button class="btn-save" style="background:linear-gradient(135deg,#0A4A28,#1E9A52);box-shadow:0 3px 12px rgba(10,74,40,.3)" onclick="guardarNuevo()">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg>
          Guardar conteo
        </button>
        <button class="btn-cancel" onclick="cerrar('mod-nuevo')">Cancelar</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL REPORTE -->
<div class="overlay" id="mod-reporte" onclick="cerrarOv('mod-reporte',event)">
  <div class="mbox" style="max-width:740px">
    <div class="rep-header-stock">
      <div>
        <div class="mtitle" id="rep-title">Reporte de Stock</div>
        <div class="msub" id="rep-sub">Generando…</div>
      </div>
      <button class="xbtn" onclick="cerrar('mod-reporte')">×</button>
    </div>
    <div class="mbody" id="rep-body"></div>
  </div>
</div>

<script src="/js/stock.js"></script>
</body>
</html>
